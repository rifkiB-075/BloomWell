<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- - primary meta tags -->
  <title>MindFullConnect Podcasts — Music Player</title>
  <meta name="title" content="MindFullConnect Podcasts — Music Player">
  <meta name="description" content="Pemutar podcast/musik untuk MindFullConnect Podcasts.">

  <!-- - open graph / social preview tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="MindFullConnect Podcasts — Music Player">
  <meta property="og:description" content="Pemutar podcast/musik untuk MindFullConnect Podcasts.">
  <meta property="og:images" content="assets/imagess/1.jpg">

  <!-- - theme color for mobile browser bar -->
  <meta name="theme-color" content="#0f0f0f">

  <!-- - favicon -->
  <link rel="shortcut icon" href="./favicon.svg" type="images/svg+xml">

  <!-- - google font link -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- - material icon font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,-25" />

  <!-- - custom css link -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <!-- - #TOP APP BAR -->
  <header class="top-bar wrapper">
    <div class="logo wrapper">
      <span class="material-symbols-rounded" aria-hidden="true">graphic_eq</span>
      <h1 class="title-lg"><a href="../index.html">MindFullConnect Podcasts</a></h1>
    </div>
    <div class="top-bar-actions">
      <button class="btn-icon" data-playlist-toggler aria-label="Buka daftar putar">
        <span class="material-symbols-rounded" aria-hidden="true">queue_music</span>
      </button>
    </div>
  </header>

  <main>
    <article>
      <!-- - #PLAYER -->
      <div class="player">
        <div class="container">
          <figure class="music-banner">
            <img src="assets/imagess/1.jpg" width="800" height="800" alt="Poster episode: Nasihat Jordan Peterson untuk orang dengan depresi" class="img-cover" data-player-banner loading="lazy">
          </figure>

          <div class="music-content">
            <h2 class="headline-sm" data-title>Jordan Peterson’s Advice For People With Depression</h2>
            <p class="label-lg label-wrapper wrapper">
              <span data-album>Guided Thoughts with Jordan Peterson </span>
              <span data-year>2021</span>
            </p>
            <p class="label-md artist" data-artist>Jordan Peterson</p>

            <div class="seek-control">
              <div>
                <div class="range-wrapper">
                  <input type="range" step="1" max="60" value="0" class="range" data-range data-seek aria-label="Posisi putar">
                  <div class="range-fill" data-range-fill></div>
                </div>
                <div class="duration-label wrapper">
                  <span class="label-md" data-running-time>0:00</span>
                  <span class="label-md" data-duration>1:00</span>
                </div>
              </div>

              <div class="volume">
                <button class="btn-icon" data-volume-btn aria-label="Bisukan/aktifkan suara">
                  <span class="material-symbols-rounded" aria-hidden="true">volume_up</span>
                </button>
                <div class="range-wrapper">
                  <input type="range" step="0.05" max="1" value="1" class="range" data-range data-volume aria-label="Volume">
                  <div class="range-fill" data-range-fill></div>
                </div>
              </div>
            </div>

            <div class="player-control wrapper">
              <button class="btn-icon toggle" data-repeat aria-label="Ulangi lagu">
                <span class="material-symbols-rounded default-icon" aria-hidden="true">repeat</span>
                <span class="material-symbols-rounded active-icon" aria-hidden="true">repeat_one</span>
              </button>
              <button class="btn-icon" data-skip-prev aria-label="Episode sebelumnya">
                <span class="material-symbols-rounded" aria-hidden="true">skip_previous</span>
              </button>
              <button class="btn-icon play" data-play-btn aria-label="Putar/jeda">
                <span class="material-symbols-rounded default-icon" aria-hidden="true">play_arrow</span>
                <span class="material-symbols-rounded active-icon" aria-hidden="true">pause</span>
              </button>
              <button class="btn-icon" data-skip-next aria-label="Episode berikutnya">
                <span class="material-symbols-rounded" aria-hidden="true">skip_next</span>
              </button>
              <button class="btn-icon toggle" data-shuffle aria-label="Acak daftar putar">
                <span class="material-symbols-rounded" aria-hidden="true">shuffle</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- - #PLAYLIST -->
      <div class="playlist" data-playlist aria-label="Daftar putar">
        <ul class="music-list" data-music-list></ul>
      </div>
      <div class="overlay" data-playlist-toggler data-overlay></div>
    </article>
  </main>
</body>
<script src="assets/js/script.js"></script>
</html>
