<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Upload PDF | BloomWell</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f8fafc; margin: 0; padding: 40px; color: #1f2937; }
        .box { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; padding: 28px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        h1 { margin-top: 0; color: #2563eb; }
        label { display: block; margin-top: 14px; font-weight: 600; }
        input, select, textarea { width: 100%; margin-top: 6px; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; }
        button { margin-top: 18px; padding: 12px 16px; border: none; border-radius: 10px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; }
        .message { margin-top: 16px; padding: 10px 12px; border-radius: 10px; }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Upload Buku PDF</h1>
        <p>Halaman ini untuk admin/developer mengunggah buku PDF yang nanti tampil di Resource Library.</p>

        <form id="uploadForm" enctype="multipart/form-data">
            <label>Judul buku</label>
            <input type="text" name="title" required />

            <label>Kategori</label>
            <select name="category">
                <option value="mindfulness">Mindfulness</option>
                <option value="anxiety">Kecemasan</option>
                <option value="relationship">Hubungan</option>
                <option value="selfcare">Self-Care</option>
                <option value="productivity">Produktivitas</option>
            </select>

            <label>Label kategori</label>
            <input type="text" name="category_label" placeholder="Contoh: Mindfulness" />

            <label>Deskripsi</label>
            <textarea name="description" rows="4" required></textarea>

            <label>Durasi baca</label>
            <input type="text" name="read_time" placeholder="Contoh: 7 menit baca" />

            <label>Pilih file PDF</label>
            <input type="file" name="pdf_file" accept="application/pdf" required />

            <button type="submit">Upload PDF</button>
        </form>

        <div id="messageBox"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const form = e.target;
            const data = new FormData(form);
            const messageBox = document.getElementById('messageBox');

            messageBox.innerHTML = '<div class="message">Mengunggah...</div>';

            try {
                const res = await fetch('backend/api/resources.php', {
                    method: 'POST',
                    body: data
                });
                const result = await res.json();

                if (result.success) {
                    messageBox.innerHTML = `<div class="message success">${result.message}</div>`;
                    form.reset();
                } else {
                    messageBox.innerHTML = `<div class="message error">${result.message}</div>`;
                }
            } catch (err) {
                messageBox.innerHTML = `<div class="message error">Terjadi kesalahan saat upload.</div>`;
            }
        });
    </script>
</body>
</html>
